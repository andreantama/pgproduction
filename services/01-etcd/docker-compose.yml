# ============================================================
# Layer 1 — etcd
# Distributed Configuration Store for Patroni HA
#
# This compose file ALSO creates the shared Docker network
# (pg-network) used by every other service layer.
# Start this layer first.
# ============================================================

networks:
  pg-network:
    name: pg-network
    driver: bridge

volumes:
  pg-etcd-data:
    name: pg-etcd-data

services:

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    hostname: etcd
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=pg-cluster-token
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - pg-etcd-data:/etcd-data
    networks:
      - pg-network
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
