# ============================================================
# Layer 6 — pgBouncer
# Connection Pooler — Port 6432
#
# Depends on: Layer 5 (HAProxy must be running)
# ============================================================

networks:
  pg-network:
    external: true
    name: pg-network

services:

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    hostname: pgbouncer
    env_file: ../../.env
    environment:
      DB_HOST: haproxy
      DB_PORT: 5000
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      DB_NAME: ${POSTGRES_DB:-mydb}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    volumes:
      - ../../config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ../../config/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - pg-network
    restart: unless-stopped
