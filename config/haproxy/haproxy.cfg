global
    maxconn 4096
    log stdout local0 format raw
    daemon

defaults
    log global
    mode tcp
    retries 2
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

frontend stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats admin if LOCALHOST

# Frontend for write (primary only)
frontend postgres_write
    bind *:5000
    mode tcp
    default_backend postgres_primary

# Frontend for read (replicas with round-robin)
frontend postgres_read
    bind *:5001
    mode tcp
    default_backend postgres_replicas

# Backend: Primary (write)
backend postgres_primary
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-primary patroni-primary:5432 check port 8008
    server patroni-replica-1 patroni-replica-1:5432 check port 8009 backup
    server patroni-replica-2 patroni-replica-2:5432 check port 8010 backup

# Backend: Replicas (read-only, round-robin)
backend postgres_replicas
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-replica-1 patroni-replica-1:5432 check port 8009
    server patroni-replica-2 patroni-replica-2:5432 check port 8010
    server patroni-primary patroni-primary:5432 check port 8008 backup
